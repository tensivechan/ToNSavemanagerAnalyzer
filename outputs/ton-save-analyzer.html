<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    document.documentElement.dataset.view =
      new URLSearchParams(location.search).get("view") === "achievements"
        ? "achievements"
        : "app";
  </script>
  <title>ToNSaveManager Analyzer</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --panel: #ffffff;
      --ink: #20232a;
      --muted: #667085;
      --line: #d8dde5;
      --accent: #136f63;
      --accent-2: #b73d36;
      --accent-3: #375a9e;
      --soft: #e8f2ef;
      --warn: #fff0d6;
      --bad: #ffe2df;
      --page-bg-a: rgba(19, 111, 99, .08);
      --page-bg-b: transparent;
      --bloodbath: #ffe7e5;
      --bloodbath-hover: #ffd9d5;
      --rt-red: #ffe1e1;
      --rt-red-hover: #ffd2d2;
      --rt-red-selected: #f5cccc;
      --rt-green: #e2f2e5;
      --rt-green-hover: #d3e9d8;
      --rt-green-selected: #c7dfcd;
      --rt-gray: #eceff3;
      --rt-gray-hover: #e1e6ec;
      --rt-gray-selected: #d8dfe6;
      --rt-cyan: #e0f6ff;
      --rt-cyan-hover: #d2effb;
      --rt-cyan-selected: #c5e7f6;
      --rt-blue: #e3efff;
      --rt-blue-hover: #d5e6ff;
      --rt-blue-selected: #cadcff;
      --rt-bloodmoon: #f5d2d2;
      --rt-bloodmoon-hover: #ecc1c1;
      --rt-bloodmoon-selected: #e0b5b5;
      --rt-yellow: #fff0bf;
      --rt-yellow-hover: #ffe8a6;
      --rt-yellow-selected: #f3da93;
      --rt-amber: #ffe0a6;
      --rt-amber-hover: #ffd38a;
      --rt-amber-selected: #f3c677;
      --rt-sun: #e6f0bf;
      --rt-sun-hover: #dae7a4;
      --rt-sun-selected: #cfdb92;
      --rt-midnight: #d7b2b2;
      --rt-midnight-hover: #c79c9c;
      --rt-midnight-selected: #b98a8a;
      --rt-brown: #e7d2bb;
      --rt-brown-hover: #dcc1a0;
      --rt-brown-selected: #cfb28b;
      --rt-purple: #e6daf4;
      --rt-purple-hover: #d7c5eb;
      --rt-purple-selected: #cab7de;
      --rt-gigabyte-blue: #d8e9ff;
      --rt-gigabyte-red: #ffe0e0;
      --shadow: 0 8px 22px rgba(32, 35, 42, .08);
      color-scheme: light;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1218;
      --panel: #181d26;
      --ink: #e8eef7;
      --muted: #9aa5b6;
      --line: #2b3442;
      --accent: #61d4c3;
      --accent-2: #ff7d75;
      --accent-3: #8aa5ff;
      --soft: #17262a;
      --warn: #3b2f19;
      --bad: #3a1b1b;
      --page-bg-a: rgba(97, 212, 195, .12);
      --page-bg-b: rgba(15, 18, 24, .03);
      --bloodbath: #341c1a;
      --bloodbath-hover: #3d211f;
      --rt-red: #382024;
      --rt-red-hover: #45272b;
      --rt-red-selected: #503036;
      --rt-green: #183123;
      --rt-green-hover: #1b3a29;
      --rt-green-selected: #20462f;
      --rt-gray: #232932;
      --rt-gray-hover: #2a313d;
      --rt-gray-selected: #313949;
      --rt-cyan: #162d34;
      --rt-cyan-hover: #1a3640;
      --rt-cyan-selected: #21404d;
      --rt-blue: #18253a;
      --rt-blue-hover: #1c2d45;
      --rt-blue-selected: #223656;
      --rt-bloodmoon: #392026;
      --rt-bloodmoon-hover: #43252d;
      --rt-bloodmoon-selected: #4d2b34;
      --rt-yellow: #3a3217;
      --rt-yellow-hover: #463c1b;
      --rt-yellow-selected: #51461f;
      --rt-amber: #342b17;
      --rt-amber-hover: #40311a;
      --rt-amber-selected: #4a381d;
      --rt-sun: #2f3516;
      --rt-sun-hover: #38411b;
      --rt-sun-selected: #424c20;
      --rt-midnight: #342325;
      --rt-midnight-hover: #40282c;
      --rt-midnight-selected: #4b2f33;
      --rt-brown: #30261d;
      --rt-brown-hover: #3a2f23;
      --rt-brown-selected: #44362a;
      --rt-purple: #2f2438;
      --rt-purple-hover: #382845;
      --rt-purple-selected: #422f52;
      --rt-gigabyte-blue: #182642;
      --rt-gigabyte-red: #3b1c24;
      --shadow: 0 10px 26px rgba(0, 0, 0, .38);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, var(--page-bg-a), var(--page-bg-b) 260px),
        var(--bg);
      color: var(--ink);
      transition: background .25s ease, color .25s ease;
    }

    body.rainbow-mode {
      --page-bg-a: rgba(255, 77, 136, .14);
      --page-bg-b: rgba(77, 192, 255, .10);
      --accent: #ff4d88;
      --accent-2: #ff9f1c;
      --accent-3: #4dc0ff;
    }

    body.rainbow-mode .app {
      animation: rainbowHue 9s linear infinite;
      filter: saturate(1.25) hue-rotate(0deg);
    }

    @keyframes rainbowHue {
      from { filter: saturate(1.25) hue-rotate(0deg); }
      to { filter: saturate(1.25) hue-rotate(360deg); }
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 7px;
      padding: 8px 11px;
      min-height: 36px;
      cursor: pointer;
    }

    button:hover { border-color: #aeb7c4; }
    button:disabled { color: #a2a9b5; cursor: not-allowed; }

    .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .ghost {
      background: transparent;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .achievements-shell {
      min-height: 100vh;
      display: none;
      grid-template-rows: auto auto 1fr;
      gap: 16px;
      padding: 22px clamp(16px, 3vw, 32px) 28px;
    }

    html[data-view="achievements"] .app {
      display: none;
    }

    html[data-view="achievements"] .achievements-shell {
      display: grid;
    }

    header {
      padding: 22px clamp(16px, 3vw, 32px) 14px;
      display: grid;
      gap: 14px;
      border-bottom: 1px solid rgba(216, 221, 229, .7);
    }

    .titlebar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.1;
      font-weight: 720;
      letter-spacing: 0;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1.1fr) minmax(180px, .8fr) auto auto auto;
      gap: 10px;
      align-items: center;
    }

    .drop {
      border: 1px dashed #aeb7c4;
      border-radius: 8px;
      background: rgba(255,255,255,.72);
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      box-shadow: var(--shadow);
    }

    .drop.dragover {
      border-color: var(--accent);
      background: var(--soft);
    }

    .file-name {
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    input[type="file"] { display: none; }

    .field {
      position: relative;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 7px;
      min-height: 40px;
      padding: 8px 10px;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(19, 111, 99, .13);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 1px;
      background: var(--line);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .metric {
      background: rgba(255,255,255,.76);
      padding: 14px clamp(10px, 2vw, 18px);
      min-width: 0;
    }

    .metric b {
      display: block;
      font-size: clamp(20px, 2.6vw, 28px);
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, .65fr);
      gap: 16px;
      padding: 16px clamp(16px, 3vw, 32px) 28px;
      min-height: 0;
    }

    .section {
      background: rgba(255,255,255,.8);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.78);
    }

    h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 270px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #fbfaf7;
      z-index: 1;
      color: #465060;
      font-size: 12px;
    }

    tr {
      cursor: pointer;
    }

    tr:hover td {
      background: #f8fbfa;
    }

    tr.selected td {
      background: var(--soft);
    }

    tr.bloodbath-row td {
      background: var(--bloodbath);
    }

    tr.bloodbath-row:hover td {
      background: var(--bloodbath-hover);
    }

    tr.bloodbath-row.selected td {
      background: #f2d9d7;
    }

    tr.rt-red-row td {
      background: var(--rt-red);
    }

    tr.rt-red-row:hover td {
      background: var(--rt-red-hover);
    }

    tr.rt-red-row.selected td {
      background: var(--rt-red-selected);
    }

    tr.rt-green-row td {
      background: var(--rt-green);
    }

    tr.rt-green-row:hover td {
      background: var(--rt-green-hover);
    }

    tr.rt-green-row.selected td {
      background: var(--rt-green-selected);
    }

    tr.rt-gray-row td {
      background: var(--rt-gray);
    }

    tr.rt-gray-row:hover td {
      background: var(--rt-gray-hover);
    }

    tr.rt-gray-row.selected td {
      background: var(--rt-gray-selected);
    }

    tr.rt-cyan-row td {
      background: var(--rt-cyan);
    }

    tr.rt-cyan-row:hover td {
      background: var(--rt-cyan-hover);
    }

    tr.rt-cyan-row.selected td {
      background: var(--rt-cyan-selected);
    }

    tr.rt-blue-row td {
      background: var(--rt-blue);
    }

    tr.rt-blue-row:hover td {
      background: var(--rt-blue-hover);
    }

    tr.rt-blue-row.selected td {
      background: var(--rt-blue-selected);
    }

    tr.rt-bloodmoon-row td {
      background: var(--rt-bloodmoon);
    }

    tr.rt-bloodmoon-row:hover td {
      background: var(--rt-bloodmoon-hover);
    }

    tr.rt-bloodmoon-row.selected td {
      background: var(--rt-bloodmoon-selected);
    }

    tr.rt-yellow-row td {
      background: var(--rt-yellow);
    }

    tr.rt-yellow-row:hover td {
      background: var(--rt-yellow-hover);
    }

    tr.rt-yellow-row.selected td {
      background: var(--rt-yellow-selected);
    }

    tr.rt-amber-row td {
      background: var(--rt-amber);
    }

    tr.rt-amber-row:hover td {
      background: var(--rt-amber-hover);
    }

    tr.rt-amber-row.selected td {
      background: var(--rt-amber-selected);
    }

    tr.rt-sun-row td {
      background: var(--rt-sun);
    }

    tr.rt-sun-row:hover td {
      background: var(--rt-sun-hover);
    }

    tr.rt-sun-row.selected td {
      background: var(--rt-sun-selected);
    }

    tr.rt-midnight-row td {
      background: var(--rt-midnight);
    }

    tr.rt-midnight-row:hover td {
      background: var(--rt-midnight-hover);
    }

    tr.rt-midnight-row.selected td {
      background: var(--rt-midnight-selected);
    }

    tr.rt-brown-row td {
      background: var(--rt-brown);
    }

    tr.rt-brown-row:hover td {
      background: var(--rt-brown-hover);
    }

    tr.rt-brown-row.selected td {
      background: var(--rt-brown-selected);
    }

    tr.rt-purple-row td {
      background: var(--rt-purple);
    }

    tr.rt-purple-row:hover td {
      background: var(--rt-purple-hover);
    }

    tr.rt-purple-row.selected td {
      background: var(--rt-purple-selected);
    }

    tr.rt-gigabyte-row td {
      background: linear-gradient(90deg, var(--rt-gigabyte-blue), var(--rt-gigabyte-red));
    }

    tr.rt-gigabyte-row:hover td {
      background: linear-gradient(90deg, #cfe1ff, #ffd4d4);
    }

    tr.rt-gigabyte-row.selected td {
      background: linear-gradient(90deg, #c6d9f6, #f4c8c8);
    }

    td.warn-cell {
      background: var(--warn);
      color: #7b4c00;
      font-weight: 600;
    }

    .note {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 2px 8px;
      background: var(--soft);
      color: #0f554d;
      border: 1px solid rgba(19, 111, 99, .18);
      font-size: 12px;
    }

    .badge.win { background: #e8f2ef; color: #0f554d; }
    .badge.loss { background: var(--bad); color: #8d211b; border-color: #f4bbb6; }
    .badge.warn { background: var(--warn); color: #7b4c00; border-color: #f1d097; }

    .detail {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }

    .detail-body {
      padding: 12px;
      overflow: auto;
      max-height: calc(100vh - 270px);
    }

    .kv {
      display: grid;
      grid-template-columns: 116px minmax(0, 1fr);
      gap: 1px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
      background: var(--line);
    }

    .kv div {
      background: var(--panel);
      padding: 8px 10px;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .kv .k {
      color: var(--muted);
      background: #fbfaf7;
      font-size: 12px;
    }

    .players {
      display: grid;
      gap: 6px;
      margin: 0 0 12px;
      padding: 0;
      list-style: none;
    }

    .players li {
      background: #fbfaf7;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 7px 9px;
      overflow-wrap: anywhere;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #101418;
      color: #e7edf4;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .empty {
      padding: 36px 16px;
      color: var(--muted);
      text-align: center;
    }

    .hidden { display: none !important; }

    body[data-theme="dark"] button,
    body[data-theme="dark"] .drop,
    body[data-theme="dark"] .metric,
    body[data-theme="dark"] .section,
    body[data-theme="dark"] .field input,
    body[data-theme="dark"] .field select,
    body[data-theme="dark"] textarea {
      background-color: var(--panel);
      color: var(--ink);
      border-color: var(--line);
    }

    body[data-theme="dark"] .drop {
      background: rgba(24, 29, 38, .95);
    }

    body[data-theme="dark"] .ghost {
      background: transparent;
    }

    body[data-theme="dark"] .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #08151a;
    }

    body[data-theme="dark"] .metric {
      background: rgba(24, 29, 38, .88);
    }

    body[data-theme="dark"] header {
      background: transparent;
    }

    body[data-theme="dark"] .section-head,
    body[data-theme="dark"] th {
      background: #141922;
    }

    body[data-theme="dark"] tr:hover td {
      background: #18202a;
    }

    body[data-theme="dark"] tr.selected td {
      background: #162329;
    }

    body[data-theme="dark"] button:hover {
      border-color: #49566a;
    }

    .achievements-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding-bottom: 2px;
    }

    .achievements-title {
      display: grid;
      gap: 6px;
    }

    .achievements-title h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 36px);
      line-height: 1.05;
    }

    .achievements-subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    .achievement-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 12px;
    }

    .achievement-summary .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .achievement-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
      min-height: 0;
    }

    .achievement-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 13px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 8px;
    }

    .achievement-card.unlocked {
      border-color: rgba(19, 111, 99, .35);
      box-shadow: 0 10px 24px rgba(19, 111, 99, .12);
    }

    .achievement-card.locked {
      opacity: .72;
    }

    .achievement-card h2 {
      font-size: 15px;
      margin: 0;
    }

    .achievement-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .achievement-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .achievement-tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 2px 8px;
      border: 1px solid var(--line);
      font-size: 12px;
      background: rgba(255,255,255,.65);
    }

    .achievement-tag.ok {
      background: var(--soft);
      color: #0f554d;
      border-color: rgba(19, 111, 99, .18);
    }

    .achievement-tag.no {
      background: var(--warn);
      color: #7b4c00;
      border-color: #f1d097;
    }

    @media (max-width: 980px) {
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .toolbar .drop {
        grid-column: 1 / -1;
      }

      .stats {
        grid-template-columns: repeat(3, 1fr);
      }

      main {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }

      th, td {
        padding: 8px;
      }

      .table-wrap,
      .detail-body {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="titlebar">
        <div>
          <h1>ToNSaveManager Analyzer</h1>
          <div class="status" id="status">JSONを選択</div>
        </div>
        <button class="ghost" id="clearBtn" disabled title="クリア">⌫</button>
        <button class="ghost" id="themeBtn" type="button" title="ダークモード">☾</button>
        <button class="ghost hidden" id="rainbowBtn" type="button" title="Rainbow">🌈</button>
        <button class="ghost" id="achievementsBtn" type="button" title="実績">🏆</button>
      </div>

      <div class="toolbar">
        <label class="drop" id="dropZone">
          <input type="file" id="fileInput" accept=".json,application/json" multiple>
          <button class="primary" type="button" id="pickBtn">📂</button>
          <span class="file-name" id="fileName">ファイル未選択</span>
        </label>
        <div class="field">
          <input id="searchInput" placeholder="検索" autocomplete="off">

    els.searchInput.addEventListener("input", applyFilters);

    async function readFiles(files) {
      const settled = await Promise.allSettled(files.map(readFile));
      const rows = [];
      const errors = [];
      settled.forEach((item, fileIndex) => {
        if (item.status === "fulfilled") {
          rows.push(...item.value.map((row, rowIndex) => normalizeRecord(row, rowIndex, files[fileIndex].name, fileIndex)));
        } else {
          errors.push(`${files[fileIndex].name}: ${item.reason && item.reason.message ? item.reason.message : "解析失敗"}`);
        }
      });
      if (!rows.length) {
        els.status.textContent = errors.length ? errors.join(" / ") : "解析対象のJSONが見つかりません";
        state.records = [];
        state.filtered = [];
        render();
        setEnabled(false);
        return;
      }
      state.fileNames = files.map(file => file.name);
      state.records = rows;
      refreshRoundTypeOptions();
      state.selectedKey = rows[0].recordKey;
      els.fileName.textContent = files.length === 1 ? files[0].name : `${files.length} files`;
      els.status.textContent = errors.length ? `${rows.length}件を解析 / ${errors.length}件スキップ` : `${rows.length}件を解析`;
      setEnabled(true);
      updateStats();
      applyFilters();
      if (window.TonAchievements) {
        window.TonAchievements.scan(state.records, window.tonsave && window.tonsave.oscSend);
        renderAchievementsView();
      }
    }

    function readFile(file) {
      return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const text = stripBom(String(reader.result || ""));
          const parsed = JSON.parse(text);
          const rows = Array.isArray(parsed) ? parsed : (Array.isArray(parsed.Collection) ? parsed.Collection : []);
          if (!rows.length) throw new Error("配列形式の保存データが見つかりません");
          resolve(rows);
        } catch (error) {
          reject(error);
        }
      };
      reader.onerror = () => reject(reader.error || new Error("ファイルを読み込めませんでした"));
      reader.readAsText(file, "utf-8");
      });
    }

    function stripBom(text) {
      return text.charCodeAt(0) === 0xfeff ? text.slice(1) : text;
    }

    function normalizeRecord(row, index, sourceFile, sourceFileIndex) {
      const players = parsePlayers(row.Players);
      const td = Array.isArray(row.TD) ? row.TD : [];
      const terrorNames = td.map(item => {
        const id = Number(item && item.i);
        const name = knownTerrors.get(id);
        return Number.isFinite(id) ? `${id}${name ? `:${name}` : ""}` : "";
      }).filter(Boolean);
      const content = typeof row.Content === "string" ? row.Content : "";
      const recordKey = `${sourceFileIndex}:${index}`;
        return {
          recordKey,
          sourceIndex: index,
          sourceFileIndex,
          sourceFile,
          note: value(row.Note),
        timestamp: value(row.Timestamp),
        mapId: numberOrNull(row.MapID),
        rawRoundType: numberOrNull(row.RT),
        roundType: inferRoundType(numberOrNull(row.RT), td.length),
        roundTypeExtra: row.RType ?? null,
        playerCount: numberOrNull(row.pc),
        players,
        terrorData: td,
        terrorLabels: terrorNames,
        terrorCount: td.length,
        expectedTerrorCount: expectedTerrorCount(inferRoundType(numberOrNull(row.RT), td.length)),
        terrorComposition: terrorComposition(inferRoundType(numberOrNull(row.RT), td.length), td),
        result: numberOrNull(row.RResult),
        errors: row.RTerrors,
        content,
        contentLength: content.length,
        raw: row
      };
    }

    function parsePlayers(playersText) {
      if (typeof playersText !== "string" || !playersText.trim()) return [];
      return playersText
        .split(/\r?\n/)
        .map(line => line.replace(/^\s*-\s*/, "").trim())
        .filter(Boolean);
    }

    function value(input) {
      return input === null || input === undefined ? "" : String(input);
    }

    function numberOrNull(input) {
      const n = Number(input);
      return Number.isFinite(n) ? n : null;
    }

    function sortRecords(records) {
      const sortMode = els.sortFilter.value;
      const compareSourceOrder = (a, b) => (a.sourceFileIndex - b.sourceFileIndex) || (a.sourceIndex - b.sourceIndex);
      const terrorKey = record => {
        const ids = record.terrorData
          .map(item => Number(item && item.i))
          .filter(Number.isFinite);
        return ids.length ? ids : [Number.POSITIVE_INFINITY];
      };
      const compareArrays = (left, right) => {
        const max = Math.max(left.length, right.length);
        for (let i = 0; i < max; i += 1) {
          const a = left[i] ?? Number.POSITIVE_INFINITY;
          const b = right[i] ?? Number.POSITIVE_INFINITY;
          if (a !== b) return a - b;
        }
        return 0;
      };

      return [...records].sort((a, b) => {
        if (sortMode === "raw") {
          return compareSourceOrder(a, b);
        }
        if (sortMode === "terror") {
          return compareArrays(terrorKey(a), terrorKey(b)) || compareSourceOrder(a, b);
        }
        if (sortMode === "map") {
          const aMap = a.mapId === null ? Number.POSITIVE_INFINITY : a.mapId;
          const bMap = b.mapId === null ? Number.POSITIVE_INFINITY : b.mapId;
          const mapDiff = aMap - bMap;
          if (mapDiff) return mapDiff;
          return compareArrays(terrorKey(a), terrorKey(b)) || compareSourceOrder(a, b);
        }
        return compareSourceOrder(a, b);
      });
    }

    function applyFilters() {
      const rawQuery = els.searchInput.value.trim();
      const isRainbowCommand = rawQuery.toLowerCase() === "rainbow";
      if (isRainbowCommand) unlockRainbow();
      const q = isRainbowCommand ? "" : rawQuery.toLowerCase();
      const roundType = els.roundTypeFilter.value;
      const hideBlank = els.hideBlankToggle.checked;
      state.filtered = state.records.filter(record => {
        if (hideBlank && !record.note.trim()) return false;
        const noteKey = record.note.trim().toLowerCase();
        if (roundType === "classicSpecial") {
          if (!classicSpecialNames.has(noteKey)) return false;
        } else if (roundType !== "all" && String(record.roundType) !== roundType) {
          return false;
        }
        const blob = [
          record.note,
          record.timestamp,
          record.sourceFile,
          record.mapId,
          record.roundType,
          record.playerCount,
          record.players.join(" "),
          record.terrorLabels.join(" ")
        ].join(" ").toLowerCase();
        const matchesSearch = !q || blob.includes(q);
        return matchesSearch;
      });
      state.filtered = sortRecords(state.filtered);
      if (!state.filtered.some(r => r.recordKey === state.selectedKey)) {
        state.selectedKey = state.filtered[0] ? state.filtered[0].recordKey : "";
      }
      render();
    }

    function refreshRoundTypeOptions() {
      const previous = els.roundTypeFilter.value || "all";
      const values = [...new Set(state.records.map(record => record.roundType).filter(value => value !== null && value !== undefined))].sort((a, b) => a - b);
      els.roundTypeFilter.innerHTML = '<option value="all">全RoundType</option><option value="classicSpecial">クラシック特殊3体</option>' + values.map(value => {
        const label = escapeHtml(formatRoundType(value));
        return `<option value="${String(value)}">${label}</option>`;
      }).join("");
      if ([...els.roundTypeFilter.options].some(option => option.value === previous)) {
        els.roundTypeFilter.value = previous;
      } else {
        els.roundTypeFilter.value = "all";
      }
    }

    function getSavedTheme() {
      const saved = localStorage.getItem("tonsave-theme");
      if (saved === "light" || saved === "dark") return saved;
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function applyTheme(theme) {
      state.theme = theme === "dark" ? "dark" : "light";
      document.body.dataset.theme = state.theme === "dark" ? "dark" : "light";
      localStorage.setItem("tonsave-theme", state.theme);
      updateThemeButton();
    }

    function toggleTheme() {

    function updateThemeButton() {

    function unlockRainbow() {

    function updateRainbowButton() {

    function applyRainbowMode(enabled) {

    function openAchievementsWindow() {
      if (window.tonsave && typeof window.tonsave.openAchievements === "function") {
        window.tonsave.openAchievements();

    function readAchievementState() {
      const catalog = window.TonAchievements && Array.isArray(window.TonAchievements.catalog)
        ? window.TonAchievements.catalog
        : [];
      const unlocked = window.TonAchievements && typeof window.TonAchievements.unlocked === "function"
        ? new Set(window.TonAchievements.unlocked())
        : new Set();
      return { catalog, unlocked };
    }

    function describeAchievementCriteria(criteria = {}) {
      const parts = [];
      if (Array.isArray(criteria.roundTypes) && criteria.roundTypes.length) {
        parts.push(`RT=${criteria.roundTypes.join("/")}`);
      }
      if (criteria.roundTypeNot !== undefined) {
        parts.push(`RT≠${criteria.roundTypeNot}`);
      }
      if (criteria.noteEquals) {
        parts.push(`Note=${criteria.noteEquals}`);
      }
      if (criteria.noteIncludes) {
        parts.push(`Note includes ${criteria.noteIncludes}`);
      }
      if (Array.isArray(criteria.mapIds) && criteria.mapIds.length) {
        parts.push(`MapID=${criteria.mapIds.join("/")}`);
      }
      if (criteria.mapId !== undefined) {
        parts.push(`MapID=${criteria.mapId}`);
      }
      if (criteria.terrorCountMin !== undefined || criteria.terrorCountMax !== undefined) {
        const min = criteria.terrorCountMin !== undefined ? criteria.terrorCountMin : "-";
        const max = criteria.terrorCountMax !== undefined ? criteria.terrorCountMax : "-";
        parts.push(`TD=${min}..${max}`);
      }
      return parts.length ? parts.join(" / ") : "条件なし";
    }

    function renderAchievementsView() {
      if (!els.achievementsGrid) return;
      const { catalog, unlocked } = readAchievementState();
      const unlockedCount = catalog.filter(item => unlocked.has(item.id)).length;
      const total = catalog.length;
      const pending = Math.max(total - unlockedCount, 0);
      const oscCount = catalog.filter(item => item.osc).length;

      els.aUnlocked.textContent = formatNumber(unlockedCount);
      els.aTotal.textContent = formatNumber(total);
      els.aPending.textContent = formatNumber(pending);
      els.aOsc.textContent = formatNumber(oscCount);
      els.achievementsSubtitle.textContent = isAchievementsView
        ? "解除済みの実績をここで確認できます"
        : "実績ウィンドウを開いて確認できます";

      els.achievementsGrid.innerHTML = catalog.length ? catalog.map(item => {
        const unlockedNow = unlocked.has(item.id);
        return `
          <article class="achievement-card ${unlockedNow ? "unlocked" : "locked"}">
            <div class="achievement-meta">
              <span class="achievement-tag ${unlockedNow ? "ok" : "no"}">${unlockedNow ? "Unlocked" : "Locked"}</span>
              <span class="badge">${escapeHtml(item.id)}</span>
            </div>
            <h2>${escapeHtml(item.name)}</h2>
            <p>${escapeHtml(item.description || "")}</p>
            <p>${escapeHtml(describeAchievementCriteria(item.criteria))}</p>
          </article>
        `;
      }).join("") : `<div class="empty">実績がまだありません</div>`;
    }

    function updateStats() {
      const maps = new Set();
      const terrors = new Set();
      let wins = 0;
      for (const record of state.records) {
        if (record.mapId !== null) maps.add(record.mapId);
        record.terrorData.forEach(item => {
          if (item && item.i !== undefined) terrors.add(Number(item.i));
        });
        if (record.result === 1) wins += 1;
      }
      els.mRecords.textContent = formatNumber(state.records.length);
      els.mMaps.textContent = formatNumber(maps.size);
      els.mTerrors.textContent = formatNumber(terrors.size);
      els.mWins.textContent = formatNumber(wins);
    }

    function render() {
      els.recordsBody.innerHTML = "";
      els.visibleCount.textContent = formatNumber(state.filtered.length);
      els.emptyState.classList.toggle("hidden", state.filtered.length > 0);
      for (const record of state.filtered) {
        const tr = document.createElement("tr");
        tr.className = [
          record.recordKey === state.selectedKey ? "selected" : "",
          isBloodbathRow(record) ? "bloodbath-row" : "",
          roundTypeRowClass(record)
        ].filter(Boolean).join(" ");
        tr.addEventListener("click", () => {
          state.selectedKey = record.recordKey;
          render();
        });
        tr.innerHTML = [
          td(record.sourceIndex + 1),
          td(record.note || "(blank)", "note"),
          td(formatTime(record.timestamp)),
          td(record.sourceFile || ""),
          td(formatRoundType(record.roundType)),
          td(formatMapLabel(record.mapId)),
          td(formatTerrorIds(record.terrorData), terrorCellClass(record)),
          td(record.playerCount ?? record.players.length)
        ].join("");
        els.recordsBody.appendChild(tr);
      }
      renderDetail();
    }

    function renderDetail() {
      const record = state.records.find(r => r.recordKey === state.selectedKey);
      if (!record) {
        els.detailBadge.textContent = "未選択";
        els.detailBody.innerHTML = `<div class="empty">レコードを選択</div>`;
        return;
      }
      els.detailBadge.textContent = `#${record.sourceIndex + 1}`;
      const players = record.players.length
        ? `<ul class="players">${record.players.map(p => `<li>${escapeHtml(p)}</li>`).join("")}</ul>`
        : `<div class="empty">Playersなし</div>`;
      els.detailBody.innerHTML = `
        <div class="kv">
          <div class="k">Terror Name</div><div>${escapeHtml(record.note || "(blank)")}</div>
          <div class="k">Timestamp</div><div>${escapeHtml(record.timestamp)}</div>
          <div class="k">File</div><div>${escapeHtml(record.sourceFile || "")}</div>
          <div class="k">MapID</div><div>${record.mapId ?? ""}</div>
          <div class="k">Map Name</div><div>${escapeHtml(formatMapLabel(record.mapId))}</div>
          <div class="k">RoundType</div><div>${escapeHtml(formatRoundType(record.roundType))}</div>
          <div class="k">RType</div><div>${escapeHtml(record.roundTypeExtra ?? "")}</div>
          <div class="k">TerrorID</div><div>${escapeHtml(formatTerrorIds(record.terrorData))}</div>
          <div class="k">内訳</div><div>${escapeHtml(record.terrorComposition || "")}</div>
          <div class="k">Player Count</div><div>${record.playerCount ?? ""}</div>
          <div class="k">RTerrors</div><div>${escapeHtml(record.errors ?? "")}</div>
        </div>
        <h2>Players</h2>
        ${players}
        <h2>TD</h2>
        <div class="kv">
          <div class="k">番号</div><div>${escapeHtml(formatTerrorIds(record.terrorData))}</div>
        </div>
      `;
    }

    function td(value, className = "") {
      return `<td class="${className}">${escapeHtml(String(value))}</td>`;
    }

    function tdRaw(value, className = "") {
      return `<td class="${className}">${value}</td>`;
    }

    function formatRoundType(rt) {
      if (rt === null || rt === undefined) return "";
      const name = roundTypes.get(Number(rt));
      return name ? `${rt}: ${name}` : String(rt);
    }

    function formatMapLabel(mapId) {
      if (mapId === null || mapId === undefined) return "";
      const name = mapNames.get(Number(mapId));
      return name ? `${mapId}: ${name}` : String(mapId);
    }

    function inferRoundType(rt, terrorCount) {
      if (rt === 6 && terrorCount === 1) return 8;
      return rt;
    }

    function expectedTerrorCount(rt) {
      if (rt === 8) return 1;
      if (rt === 6 || rt === 50) return 3;
      return null;
    }

    function formatTerrors(record) {
      const labels = formatTerrorIds(record.terrorData);
      if (!record.expectedTerrorCount) return labels;
      const count = record.terrorCount;
      const status = count === record.expectedTerrorCount ? `${count}体` : `${count}/${record.expectedTerrorCount}体`;
      return labels ? `${status} - ${labels}` : status;
    }

    function terrorComposition(rt, td) {
      if (!Array.isArray(td) || rt !== 50) return "";
      const alternate = td.filter(item => item && item.g !== undefined && item.g !== null).length;
      const classic = td.length - alternate;
      return `クラシック${classic}体 / オルタネイト${alternate}体`;
    }

    function terrorCellClass(record) {
      if (record.expectedTerrorCount && record.terrorCount !== record.expectedTerrorCount) return "warn-cell";
      if (record.roundType === 50 && !isMidnightComposition(record.terrorData)) return "warn-cell";
      return "";
    }

    function roundTypeRowClass(record) {
      const rt = record.roundType;
      const extra = String(record.roundTypeExtra ?? "").toUpperCase();
      if (rt === 7 || extra.includes("LVL2")) return "rt-red-row";
      if (rt === 8) return "rt-red-row";
      if (rt === 4 || rt === 12) return "rt-green-row";
      if (rt === 2 || rt === 52) return "rt-gray-row";
      if (rt === 9 || rt === 53) return "rt-cyan-row";
      if (rt === 100) return "rt-blue-row";
      if (rt === 101) return "rt-bloodmoon-row";
      if (rt === 102) return "rt-yellow-row";
      if (rt === 3 || rt === 11) return "rt-amber-row";
      if (rt === 103) return "rt-sun-row";
      if (rt === 5) return "rt-purple-row";
      if (rt === 50) return "rt-midnight-row";
      if (rt === 104) return "rt-brown-row";
      if (rt === 106) return "rt-gigabyte-row";
      return "";
    }

    function isBloodbathRow(record) {
      return record.rawRoundType === 6 && record.roundType === 6;
    }

    function isMidnightComposition(td) {
      if (!Array.isArray(td) || td.length !== 3) return false;
      const alternate = td.filter(item => item && item.g !== undefined && item.g !== null).length;
      return alternate === 1;
    }

    function summarizeTd(tdArray) {
      if (!Array.isArray(tdArray) || !tdArray.length) return "";
      return tdArray.map(item => {
        if (!item || typeof item !== "object") return "";
        return item.i !== undefined ? String(item.i) : "";
      }).filter(Boolean).join(", ");
    }

    function formatTerrorIds(tdArray) {
      return summarizeTd(tdArray);
    }

    function formatTime(input) {
      if (!input) return "";
      const date = new Date(input);
      if (Number.isNaN(date.getTime())) return input;
      return input.replace("T", " ");
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("ja-JP").format(value || 0);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function exportCsv() {
      const rows = state.filtered.map(record => ({
        index: record.sourceIndex + 1,
        note: record.note,
        timestamp: record.timestamp,
        mapId: record.mapId,
        roundType: record.roundType,
        roundTypeName: roundTypes.get(Number(record.roundType)) || "",
        terrorCount: record.terrorCount,
        expectedTerrorCount: record.expectedTerrorCount,
        terrorComposition: record.terrorComposition,
        td: summarizeTd(record.terrorData),
        pc: record.playerCount,
        players: record.players.join("; "),
        rawRoundType: record.rawRoundType,
        contentLength: record.contentLength
      }));
      const headers = Object.keys(rows[0] || {});
      const csv = [
        headers.join(","),
        ...rows.map(row => headers.map(header => csvCell(row[header])).join(","))
      ].join("\\r\\n");
      download(`${baseName()}-analysis.csv`, csv, "text/csv;charset=utf-8");
    }

    function exportJson() {
      const rows = state.filtered.map(record => ({
        index: record.sourceIndex + 1,
        note: record.note,
        timestamp: record.timestamp,
        mapId: record.mapId,
        roundType: record.roundType,
        roundTypeName: roundTypes.get(Number(record.roundType)) || "",
        terrorCount: record.terrorCount,
        expectedTerrorCount: record.expectedTerrorCount,
        terrorComposition: record.terrorComposition,
        rType: record.roundTypeExtra,
        pc: record.playerCount,
        players: record.players,
        td: record.terrorData,
        rawRoundType: record.rawRoundType,
        rtErrors: record.errors,
        contentLength: record.contentLength,
        contentPreview: record.content.slice(0, 500)
      }));
      download(`${baseName()}-analysis.json`, JSON.stringify(rows, null, 2), "application/json;charset=utf-8");
    }

    function csvCell(value) {
      const text = value === null || value === undefined ? "" : String(value);
      return `"${text.replaceAll('"', '""')}"`;
    }

    function download(name, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function baseName() {
      return (state.fileName || "ton-save").replace(/\\.json$/i, "").replace(/[\\\\/:*?"<>|]+/g, "_");
    }

    function setEnabled(enabled) {
      els.exportCsvBtn.disabled = !enabled;
      els.exportJsonBtn.disabled = !enabled;
      els.clearBtn.disabled = !enabled;
    }

    function reset() {
      state.fileNames = [];
      state.records = [];
      state.filtered = [];
      state.selectedKey = "";
      els.fileInput.value = "";
      els.fileName.textContent = "ファイル未選択";
      els.status.textContent = "JSONを選択";
      els.searchInput.value = "";
      state.rainbowMode = localStorage.getItem("tonsave-rainbow-mode") === "1";
      els.roundTypeFilter.innerHTML = '<option value="all">全RoundType</option><option value="classicSpecial">クラシック特殊3体</option>';
      els.roundTypeFilter.value = "all";
      els.sortFilter.value = "raw";
      els.hideBlankToggle.checked = true;
      setEnabled(false);
      applyRainbowMode(state.rainbowMode);
      updateRainbowButton();
      updateThemeButton();
      updateStats();
      render();
      renderAchievementsView();
    }

    reset();
  </script>
</body>
</html>
